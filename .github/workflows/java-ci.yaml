name: build

on: [push]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 25
      - name: Extract PZ version from Gradle
        run: |
          PZ_VERSION=$(./gradlew -q printPzVersion)
          [ -z "$PZ_VERSION" ] && { echo "::error::PZ_VERSION empty"; exit 1; }
          echo "PZ_VERSION=$PZ_VERSION" >> "$GITHUB_ENV"
      - name: Create local.properties
        run: |
          echo "gameDir=${{ github.workspace }}/lib/zomboid" > local.properties
          echo "serverDir=na" > local.properties
      - name: Download Zomboid classes from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          mkdir -p lib
          aws s3 cp "s3://${{ secrets.S3_BUCKET }}/zomboid-${{ env.PZ_VERSION }}.zip" lib/zomboid-${{ env.PZ_VERSION }}.zip
          unzip lib/zomboid-${{ env.PZ_VERSION }}.zip -d lib/zomboid
      # - name: Test
      #   run: |
      #     ./gradlew test
      # - name: Upload Test Reports
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-report-${{ runner.os }}
      #     path: ./**/build/reports/tests/

  tag:
    name: Create version tag
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 25
      - name: Extract version from Gradle
        id: version
        env:
          STAGING: "true"
        run: |
          VERSION=$(./gradlew -q printVersion)
          [ -z "$VERSION" ] && { echo "::error::version empty"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags --exit-code origin "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
