test {
	useJUnitPlatform()
	def serverDir = getLocalProperty('serverPath').get()
	systemProperty 'storm.server.path', serverDir
	systemProperty 'storm.testing', 'true'
	def ldLibPath = [
		"${serverDir}/natives",
		"${serverDir}/linux64",
		"${serverDir}/jre64/lib/amd64",
		System.getenv('LD_LIBRARY_PATH') ?: ''
	].findAll { it }.join(':')
	environment 'LD_LIBRARY_PATH', ldLibPath
	finalizedBy jacocoTestReport

	testLogging {
		events "passed", "skipped", "failed", "standardOut", "standardError"
		showStandardStreams = true
		showExceptions = true
		showCauses = true
		showStackTraces = true
		exceptionFormat = "full"
	}
}

